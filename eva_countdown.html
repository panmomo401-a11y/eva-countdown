<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伊娃素水餃倒數計時器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #fff5f7;
    font-family: 'Nunito', 'Noto Serif TC', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  .bg-bubbles {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bubble {
    position: absolute;
    border-radius: 50%;
    opacity: 0.12;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0%   { transform: translateY(110vh) scale(0.8); opacity: 0.12; }
    100% { transform: translateY(-10vh) scale(1.1); opacity: 0; }
  }

  .hero {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 600px;
    margin: 40px auto 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .photo-frame {
    position: relative;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 6px solid #fff;
    box-shadow: 0 8px 40px rgba(255,120,150,0.35), 0 2px 10px rgba(0,0,0,0.08);
    overflow: hidden;
    animation: popIn 0.8s cubic-bezier(0.175,0.885,0.32,1.275) both;
  }
  @keyframes popIn {
    from { transform: scale(0.4) rotate(-10deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }

  .crown {
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 42px;
    animation: bounce 2s ease-in-out infinite;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
  }
  @keyframes bounce {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-6px); }
  }

  .title-block {
    margin-top: 28px;
    text-align: center;
    animation: fadeUp 0.9s 0.3s both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .title-name {
    font-size: 2rem;
    font-weight: 900;
    color: #e84176;
    letter-spacing: 2px;
    text-shadow: 0 2px 8px rgba(232,65,118,0.18);
  }

  .title-desc {
    margin-top: 10px;
    font-size: 1.05rem;
    color: #7a3f54;
    line-height: 1.7;
    font-family: 'Noto Serif TC', serif;
  }

  .dumpling-icon {
    font-size: 2rem;
    display: inline-block;
    animation: spin 3s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .countdown-wrapper {
    position: relative;
    z-index: 1;
    margin: 36px auto 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    width: min(92vw, 560px);
    animation: fadeUp 1s 0.6s both;
  }

  .unit-card {
    background: #fff;
    border-radius: 22px;
    box-shadow: 0 6px 28px rgba(232,65,118,0.13), 0 1px 4px rgba(0,0,0,0.06);
    padding: 20px 8px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    border-top: 4px solid transparent;
    transition: transform 0.2s;
  }
  .unit-card:hover { transform: translateY(-4px); }

  .unit-card.days    { border-top-color: #f06292; }
  .unit-card.hours   { border-top-color: #ff8a65; }
  .unit-card.minutes { border-top-color: #66bb6a; }
  .unit-card.seconds { border-top-color: #42a5f5; }

  .unit-number {
    font-size: 2.6rem;
    font-weight: 900;
    line-height: 1;
    font-family: 'Nunito', sans-serif;
    letter-spacing: -1px;
  }
  .days    .unit-number { color: #e91e63; }
  .hours   .unit-number { color: #f4511e; }
  .minutes .unit-number { color: #2e7d32; }
  .seconds .unit-number { color: #1565c0; }

  .unit-label {
    margin-top: 8px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: #999;
    text-transform: uppercase;
  }

  .flip {
    animation: flip 0.35s ease;
  }
  @keyframes flip {
    0%   { transform: rotateX(0deg); }
    50%  { transform: rotateX(-90deg); }
    100% { transform: rotateX(0deg); }
  }

  .deadline-note {
    position: relative;
    z-index: 1;
    margin: 24px auto 0;
    padding: 12px 24px;
    background: #fff;
    border-radius: 50px;
    box-shadow: 0 3px 16px rgba(0,0,0,0.07);
    color: #c2185b;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    animation: fadeUp 1s 0.9s both;
  }

  .footer-emoji {
    position: relative;
    z-index: 1;
    margin: 32px 0 40px;
    font-size: 1.6rem;
    letter-spacing: 6px;
    animation: fadeUp 1s 1.1s both;
  }

  .arrived-msg {
    position: relative;
    z-index: 1;
    display: none;
    flex-direction: column;
    align-items: center;
    margin-top: 32px;
    animation: popIn 0.8s cubic-bezier(0.175,0.885,0.32,1.275) both;
  }
  .arrived-msg .big-text {
    font-size: 2.4rem;
    font-weight: 900;
    color: #e84176;
    text-align: center;
    line-height: 1.4;
  }
  .arrived-msg .sub-text {
    margin-top: 12px;
    font-size: 1.1rem;
    color: #7a3f54;
    text-align: center;
  }
  .confetti-burst {
    font-size: 2.5rem;
    letter-spacing: 8px;
    margin-top: 10px;
    animation: bounce 1s ease-in-out infinite;
  }
</style>
</head>

<div class="countdown-wrapper" id="countdownWrapper">
  <div class="unit-card days">
    <div class="unit-number" id="d">--</div>
    <div class="unit-label">天</div>
  </div>
  <div class="unit-card hours">
    <div class="unit-number" id="h">--</div>
    <div class="unit-label">小時</div>
  </div>
  <div class="unit-card minutes">
    <div class="unit-number" id="m">--</div>
    <div class="unit-label">分鐘</div>
  </div>
  <div class="unit-card seconds">
    <div class="unit-number" id="s">--</div>
    <div class="unit-label">秒</div>
  </div>
</div>

<div class="deadline-note">🗓️ 截止時間：2026 年 6 月 2 日 早上 08:30</div>

<div class="arrived-msg" id="arrivedMsg">
  <div class="big-text">🥟 水餃到了！！ 🥟</div>
  <div class="sub-text">伊娃已經帶著素水餃到公司囉！<br>快去排隊試吃！</div>
  <div class="confetti-burst">🎉🎊🎉🎊🎉</div>
</div>

<div class="footer-emoji">🥟 🍴 🥢 🎉 🌿</div>

<script>
const TARGET = new Date('2026-06-02T08:30:00');

const dEl = document.getElementById('d');
const hEl = document.getElementById('h');
const mEl = document.getElementById('m');
const sEl = document.getElementById('s');
const wrapper = document.getElementById('countdownWrapper');
const arrivedMsg = document.getElementById('arrivedMsg');

let prevD, prevH, prevM, prevS;

function pad(n) { return String(Math.max(0, Math.floor(n))).padStart(2, '0'); }

function flip(el) {
  el.classList.remove('flip');
  void el.offsetWidth;
  el.classList.add('flip');
}

function tick() {
  const now = new Date();
  const diff = TARGET - now;
  if (diff <= 0) {
    wrapper.style.display = 'none';
    arrivedMsg.style.display = 'flex';
    return;
  }
  const days    = Math.floor(diff / 86400000);
  const hours   = Math.floor((diff % 86400000) / 3600000);
  const minutes = Math.floor((diff % 3600000)  / 60000);
  const seconds = Math.floor((diff % 60000)    / 1000);

  const pd = pad(days), ph = pad(hours), pm = pad(minutes), ps = pad(seconds);

  if (pd !== prevD) { dEl.textContent = pd; flip(dEl); prevD = pd; }
  if (ph !== prevH) { hEl.textContent = ph; flip(hEl); prevH = ph; }
  if (pm !== prevM) { mEl.textContent = pm; flip(mEl); prevM = pm; }
  if (ps !== prevS) { sEl.textContent = ps; flip(sEl); prevS = ps; }
}

tick();
setInterval(tick, 500);

// Floating bubbles
const colors = ['#f48fb1','#ffccbc','#c8e6c9','#bbdefb','#fff9c4','#e1bee7'];
const bubblesEl = document.getElementById('bubbles');
for (let i = 0; i < 18; i++) {
  const b = document.createElement('div');
  b.className = 'bubble';
  const size = 20 + Math.random() * 60;
  b.style.cssText = [
    'width:' + size + 'px',
    'height:' + size + 'px',
    'left:' + (Math.random() * 100) + '%',
    'background:' + colors[Math.floor(Math.random() * colors.length)],
    'animation-duration:' + (6 + Math.random() * 10) + 's',
    'animation-delay:' + (Math.random() * 10) + 's'
  ].join(';');
  bubblesEl.appendChild(b);
}
</script>
